# Запасной конфиг: весь трафик в Docker (если dist/nginx даёт 500).
# cp deploy/nginx/technical-library-proxy.conf /etc/nginx/sites-available/technical-library
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name 192.168.11.83;

    client_max_body_size 512M;
    client_body_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512M;
        client_body_timeout 600s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name library.local library;

    client_max_body_size 512M;
    client_body_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 512M;
        client_body_timeout 600s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
