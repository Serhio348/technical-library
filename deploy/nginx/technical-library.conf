# Technical Library — nginx (рядом с osmos на том же VPS)
#
# Osmos:    http://192.168.11.83        (:80, default_server)
# Library:  http://192.168.11.83:8080   (этот конфиг)
#           http://library.local        (:80, если прописать hosts)
#
# UI: сначала apps/web/dist (если собран), иначе fallback → Docker :3021
# API: всегда Docker :3021
#
# Свежий фронт (иконка «Чат» и т.д.):
#   ./scripts/build-web.sh && sudo nginx -t && sudo systemctl reload nginx

# --- Основной доступ по IP в LAN (без правки hosts) ---
server {
    listen 8080;
    listen [::]:8080;
    server_name 192.168.11.83;

    root /opt/services/technical-library/apps/web/dist;
    index index.html;

    client_max_body_size 205M;

    location /api/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 205M;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3021/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        try_files $uri @docker;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ @spa;
        add_header Cache-Control "no-store";
    }

    location @spa {
        try_files /index.html @docker;
    }

    location @docker {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 205M;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# --- Красивый URL на :80 (не конфликтует с osmos default_server) ---
server {
    listen 80;
    listen [::]:80;
    server_name library.local library;

    root /opt/services/technical-library/apps/web/dist;
    index index.html;

    client_max_body_size 205M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 205M;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3021/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets/ {
        try_files $uri @docker;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ @spa;
        add_header Cache-Control "no-store";
    }

    location @spa {
        try_files /index.html @docker;
    }

    location @docker {
        proxy_pass http://127.0.0.1:3021;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 205M;
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
