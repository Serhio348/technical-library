services:
  technical-library:
    build:
      context: .
      dockerfile: services/library/Dockerfile
      args:
        WEB_CACHEBUST: ${WEB_CACHEBUST:-0}
    container_name: technical-library
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LIBRARY_PORT: 3021
      LIBRARY_ROOT: /data/library
    volumes:
      - ./data/library:/data/library
    ports:
      - "127.0.0.1:3021:3021"
